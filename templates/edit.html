<!DOCTYPE html>
<html>
<head>
    <title>Edit Expense</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: blue;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Edit Expense</h2>

    <form method="POST">

        <input type="text" name="amount" value="{{ expense.amount }}" required>

        <input type="text" name="category" value="{{ expense.category }}" required>

        <input type="text" name="description" value="{{ expense.description }}" required>

        <input type="date" name="date" value="{{ expense.date }}" required>

        <button type="submit">Update</button>

    </form>

</div>

</body>
</html>
