<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #f4f6ff;
            transition: all 0.3s ease;
        }

        /* DARK MODE */
        body.dark {
            background: #0f172a;
            color: white;
        }

        /* NAVBAR */
        .navbar {
            background: #111827;
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar a, .navbar button {
            color: white;
            text-decoration: none;
            margin-left: 15px;
            font-weight: 500;
            background: none;
            border: none;
            cursor: pointer;
        }

        /* CONTAINER */
        .container {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }

        /* STATS */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            text-align: center;
            transition: 0.3s;
        }

        body.dark .card,
        body.dark .chart-box,
        body.dark .expense {
            background: #1e293b;
            color: white;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            margin: 0;
            font-size: 16px;
            color: #6b7280;
        }

        .card h2 {
            margin-top: 10px;
            font-size: 26px;
        }

        /* BUTTON */
        .add-btn {
            display: inline-block;
            margin-top: 15px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            padding: 10px 15px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .add-btn:hover {
            transform: scale(1.05);
        }

        /* CHART */
        .chart-box {
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 14px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        /* EXPENSE CARD */
        .expense {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-top: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .expense:hover {
            transform: scale(1.02);
        }

        .amount {
            font-size: 18px;
            font-weight: bold;
            color: #16a34a;
        }

        .meta {
            color: #6b7280;
            font-size: 13px;
        }

        .btn {
            display: inline-block;
            margin-top: 8px;
            padding: 6px 10px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            font-size: 12px;
        }

        .edit { background: #2563eb; }
        .delete { background: #ef4444; }

        /* MOBILE */
        @media (max-width: 768px) {
            .stats {
                grid-template-columns: 1fr;
            }

            .navbar {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>

<body>

<div class="navbar">
    <div>💰 Expense Tracker</div>
    <div>
        <a href="/add">Add Expense</a>
        <a href="/logout">Logout</a>
        <button onclick="toggleDark()">🌙 Dark Mode</button>
    </div>
</div>

<div class="container">

    <!-- STATS -->
    <div class="stats">

        <div class="card">
            <h3>Total Expense</h3>
            <h2>{{ total }}</h2>
        </div>

        <div class="card">
            <h3>Total Items</h3>
            <h2>{{ expenses|length }}</h2>
        </div>

        <div class="card">
            <h3>Status</h3>
            <h2>Active</h2>
        </div>

    </div>

    <a class="add-btn" href="/add">+ Add Expense</a>

    <!-- CHART -->
    <div class="chart-box">
        <canvas id="chart"></canvas>
    </div>

    <script>
        new Chart(document.getElementById('chart'), {
            type: 'bar',

            data: {
                labels: {{ labels | tojson }},
                datasets: [{
                    label: "Expenses",
                    data: {{ values | tojson }},
                    backgroundColor: ['#4f46e5','#22c55e','#f97316','#ef4444','#06b6d4'],
                    borderRadius: 8
                }]
            },

            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true }
                },
                plugins: {
                    legend: { display: false }
                }
            }
        });

        function toggleDark() {
            document.body.classList.toggle("dark");
        }
    </script>

    <!-- EXPENSE LIST -->
    {% for e in expenses %}
    <div class="expense">
        <div class="amount">💰 {{ e.amount }}</div>
        <div class="meta">📂 {{ e.category }}</div>
        <div class="meta">📝 {{ e.description }}</div>
        <div class="meta">📅 {{ e.date }}</div>

        <a class="btn edit" href="/edit/{{ e.id }}">Edit</a>
        <a class="btn delete" href="/delete/{{ e.id }}">Delete</a>
    </div>
    {% endfor %}

</div>

</body>
</html>
