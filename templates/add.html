<!DOCTYPE html>
<html>
<head>
    <title>Add Expense</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            height: 100vh;

            /* PREMIUM BACKGROUND */
            background: radial-gradient(circle at top, #60a5fa, #1e3a8a);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .wrapper {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        /* GLASS CARD STYLE */
        .glass {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 18px;
            padding: 20px;
            color: white;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        /* LEFT TIPS */
        .tips {
            width: 260px;
        }

        .tips h2 {
            margin-bottom: 12px;
        }

        .tip {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 10px;
            font-size: 13px;
        }

        /* FORM CARD */
        .form-card {
            width: 340px;
            background: white;
            border-radius: 18px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
            color: #111827;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            font-size: 14px;
            outline: none;
        }

        textarea {
            height: 80px;
            resize: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #3b82f6;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.03);
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 10px;
            font-size: 13px;
            color: #6b7280;
            text-decoration: none;
        }

        .back:hover {
            color: black;
        }

    </style>
</head>

<body>

<div class="wrapper">

    <!-- LEFT: PREMIUM TIPS -->
    <div class="glass tips">
        <h2>💡 Expense Tips</h2>

        <div class="tip">🍔 Food → Try to limit daily spending</div>
        <div class="tip">✈️ Travel → Track weekly expenses</div>
        <div class="tip">🧾 Bills → Fixed monthly costs</div>
        <div class="tip">🛍️ Shopping → Avoid impulse buying</div>
        <div class="tip">💰 Tip → Save at least 20% income</div>
    </div>

    <!-- RIGHT: FORM -->
    <div class="form-card">

        <h2>💰 Add Expense</h2>

        <form method="POST">

            <input type="number" name="amount" placeholder="💵 Enter Amount" required>

            <select name="category" required>
                <option value="">📂 Select Category</option>
                <option value="Food">🍔 Food</option>
                <option value="Travel">✈️ Travel</option>
                <option value="Bills">🧾 Bills</option>
                <option value="Shopping">🛍️ Shopping</option>
                <option value="Other">📦 Other</option>
            </select>

            <textarea name="description" placeholder="📝 Write description..." required></textarea>

            <input type="date" name="date" required>

            <button type="submit">➕ Add Expense</button>

        </form>

        <a class="back" href="/dashboard">← Back to Dashboard</a>

    </div>

</div>

</body>
</html>
